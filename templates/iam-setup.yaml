AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GitSync-enabled CloudFormation template that creates IAM users,
  groups, permissions, and a shared temporary password in Secrets Manager.

Parameters:
  Prefix:
    Type: String
    Description: Short prefix to avoid username collisions (e.g. your initials)

Resources:

  IAMTemporaryPassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: iam-user-temp-password
      Description: Auto-generated temporary password for all IAM users
      GenerateSecretString:
        SecretStringTemplate: '{"username": "iam-shared"}'
        GenerateStringKey: password
        PasswordLength: 16
        ExcludeCharacters: '"@/\'
        RequireEachIncludedType: true

  S3UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: S3UserGroup
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess

  EC2UserGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: EC2UserGroup
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess

  EC2User1:
    Type: AWS::IAM::User
    DependsOn: IAMTemporaryPassword
    Properties:
      UserName: !Sub "${Prefix}-ec2-user1"
      Groups:
        - !Ref EC2UserGroup
      LoginProfile:
        Password: !Sub
          - '{{resolve:secretsmanager:${SecretId}:SecretString:password}}'
          - SecretId: !Ref IAMTemporaryPassword
        PasswordResetRequired: true

  EC2User2PermissionBoundary:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: EC2NoRunInstancesBoundary
      Description: Permission boundary that prevents ec2:RunInstances from being exercised
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            NotAction: ec2:RunInstances
            Resource: '*'

  EC2User2:
    Type: AWS::IAM::User
    DependsOn: IAMTemporaryPassword
    Properties:
      UserName: !Sub "${Prefix}-ec2-user2"
      Groups:
        - !Ref EC2UserGroup
      PermissionsBoundary: !Ref EC2User2PermissionBoundary
      LoginProfile:
        Password: !Sub
          - '{{resolve:secretsmanager:${SecretId}:SecretString:password}}'
          - SecretId: !Ref IAMTemporaryPassword
        PasswordResetRequired: true

  S3User:
    Type: AWS::IAM::User
    DependsOn: IAMTemporaryPassword
    Properties:
      UserName: !Sub "${Prefix}-s3-user"
      Groups:
        - !Ref S3UserGroup
      LoginProfile:
        Password: !Sub
          - '{{resolve:secretsmanager:${SecretId}:SecretString:password}}'
          - SecretId: !Ref IAMTemporaryPassword
        PasswordResetRequired: true
  
  S3User2:
    Type: AWS::IAM::User
    DependsOn: IAMTemporaryPassword
    Properties:
      UserName: !Sub "${Prefix}-s3-user-2"
      Groups:
        - !Ref S3UserGroup
      LoginProfile:
        Password: !Sub
          - '{{resolve:secretsmanager:${SecretId}:SecretString:password}}'
          - SecretId: !Ref IAMTemporaryPassword
        PasswordResetRequired: true

Outputs:
  TemporaryPasswordSecretARN:
    Description: ARN of the Secrets Manager secret storing the temporary password
    Value: !Ref IAMTemporaryPassword

  S3UserGroupName:
    Value: !Ref S3UserGroup

  EC2UserGroupName:
    Value: !Ref EC2UserGroup
